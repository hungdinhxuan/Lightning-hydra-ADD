name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    #runs-on: ubuntu-22.04
    runs-on: minipc1
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_NAME: lightning-hydra-add
      IMAGE_VERSION: ${{ github.sha }}

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Log in to GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ORG_GHCR_PAT }}

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Optional: Clean up Docker to free space
      # - name: Clean up Docker
      #   run: docker system prune -af

      # 5. Build and push Docker image with registry cache
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
          cache-from: type=registry,ref=ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:cache,mode=max
          # squash: true

      # 6. Optional: Add 'latest' tag
      - name: Tag latest
        if: github.ref == 'refs/heads/main'
        run: |
          docker pull ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
          docker tag ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }} ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/cnsl-aisrc/${{ env.IMAGE_NAME }}:latest

  # Gọi workflow ở repo kfp_add (build-and-deploy.yml) sau khi image đã push
  trigger-kfp:
    name: Trigger KFP build and deploy
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Repository dispatch to kfp_add
        env:
          GH_TOKEN: ${{ secrets.ORG_GHCR_PAT }}
          KFP_REPO: ${{ vars.KFP_ADD_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${KFP_REPO:-}" ]; then
            echo "Mising variable KFP_ADD_REPO (Settings → Secrets and variables → Actions → Variables): đặt dạng owner/repo, ví dụ cnsl-aisrc/kfp_add"
            exit 1
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${KFP_REPO}/dispatches" \
            -d "{\"event_type\":\"lightning-hydra-add-image-pushed\",\"client_payload\":{\"source_sha\":\"${{ github.sha }}\",\"source_repo\":\"${{ github.repository }}\"}}"
